<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Deletion - Playlist'd</title>
    <meta
      name="description"
      content="How to request account deletion and data removal for Playlist'd."
    />
  </head>
  <body style="font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; line-height: 1.5;">
    <h1>Account Deletion Request</h1>
    <p>
      To delete your Playlist'd account and wipe your data, open the app,
      go to <strong>Profile</strong>, then tap
      <strong>Delete my account</strong> and confirm.
    </p>
    <p>
      If you cannot access the app, email
      <a href="mailto:support@playlisted.app?subject=Account%20Deletion%20Request">support@playlisted.app</a>
      from your account email and request deletion.
    </p>
  </body>
</html>
